version: '3'
services:
  postgres:
    image: postgres:latest
    container_name: postgres-container
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=cotw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine
    command: [ "redis-server", "--appendonly", "yes" ]   # AOF로 내구성 확보
    ports: [ "6379:6379" ]
    volumes:
      - redis-data:/data


volumes:
  postgres-data:
  redis-data:

networks:
  postgres-network:
    driver: bridge
