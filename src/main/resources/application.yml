spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: ${DB_ID:postgres}
    password: ${DB_PW:myPW}

  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        default_schema: cotw
    hibernate:
      ddl-auto: create

logging:
  level:
    org:
      hibernate:
        sql: debug
        type: trace

jwt:
  secret: "Y2VudGVyb2Z0aGV3b3JsZGFuZHRvZ2V0aGVyd2l0aHVzYTQ1MmFhYmI3YjliYmJiYjljODVjYzllZXcyMzUyb3BxcnN0dQ=="
  issuer: cotw
  access-exp-seconds: 3600