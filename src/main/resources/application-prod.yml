spring:
  config:
    activate:
      on-profile: prod

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:cotw}
    username: ${DB_ID}
    password: ${DB_PASSWORD}

  jpa:
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        default_batch_fetch_size: 1000
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      client-type: lettuce

  security:
    oauth2:
      client:
        registration:
          google:
            client-name: Google
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "${BACKEND_URL}/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            scope:
              - profile
              - email
          naver:
            client-name: Naver
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "${BACKEND_URL}/login/oauth2/code/callback"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
              - profile_image
              - profile
          kakao:
            client-name: Kakao
            client-authentication-method: client_secret_post
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "${BACKEND_URL}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            scope:
              - account_email
              - profile_nickname
              - profile_image
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

logging:
  level:
    org:
      hibernate:
        sql: warn
        type: warn

jwt:
  header: Authorization
  secret: ${JWT_SECRET}

app:
  front-redirect-base: ${FRONTEND_URL}
  frontend-url: ${FRONTEND_URL}

toss:
  secretKey: ${TOSS_SECRET_KEY}
  api-url: ${TOSS_API_URL:https://api.tosspayments.com}

resilience4j:
  circuitbreaker:
    instances:
      paymentService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 30s
        failure-rate-threshold: 50
        event-consumer-buffer-size: 10
  retry:
    instances:
      paymentService:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.lang.Exception
  bulkhead:
    instances:
      paymentService:
        max-concurrent-calls: 5
        max-wait-duration: 10s
  timelimiter:
    instances:
      paymentService:
        timeout-duration: 10s

aws:
  accessKey: ${AWS_ACCESS_KEY}
  secretKey: ${AWS_SECRET_KEY}
  region: ${AWS_REGION:ap-southeast-2}
  s3:
    bucket: ${AWS_S3_BUCKET}